<cs8-v02.html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>청석고 8회 상조회 회비관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .hidden-view { display: none !important; }
        input:focus, textarea:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 1px #3b82f6; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-200 flex justify-center h-screen overflow-hidden font-sans text-slate-800">
    <div class="w-full max-w-md h-full bg-white relative shadow-2xl border-x border-slate-300 flex flex-col">
        
        <!-- 1. 메인 화면 -->
        <div id="view-main" class="flex flex-col items-center justify-start pt-12 h-full p-6 bg-slate-50 overflow-y-auto">
            <div class="text-center space-y-2 mb-10">
                <h1 class="text-3xl font-extrabold text-blue-900 leading-tight">청석고 8회 상조회<br/>회비관리 시스템</h1>
            </div>
            <div class="grid grid-cols-1 gap-4 w-full max-w-sm mb-6">
                <button onclick="window.changeView('member')" class="flex items-center justify-between p-5 bg-white border-2 border-blue-100 rounded-2xl shadow-sm hover:bg-blue-50 transition-all w-full">
                    <div class="flex items-center gap-4">
                        <div class="p-3 bg-blue-100 text-blue-700 rounded-xl"><i class="fa-solid fa-user text-xl"></i></div>
                        <div class="text-left"><div class="font-bold text-lg text-slate-800">회원용 모드</div><div class="text-sm text-slate-500">납부 현황 조회하기</div></div>
                    </div>
                    <i class="fa-solid fa-chevron-right text-slate-300"></i>
                </button>
                <button onclick="window.changeView('admin-login')" class="flex items-center justify-between p-5 bg-white border-2 border-slate-200 rounded-2xl shadow-sm hover:bg-slate-50 transition-all w-full">
                    <div class="flex items-center gap-4">
                        <div class="p-3 bg-slate-100 text-slate-700 rounded-xl"><i class="fa-solid fa-gear text-xl"></i></div>
                        <div class="text-left"><div class="font-bold text-lg text-slate-800">관리자용 모드</div><div class="text-sm text-slate-500">회원 자료 수정하기</div></div>
                    </div>
                    <i class="fa-solid fa-chevron-right text-slate-300"></i>
                </button>
            </div>
            <div class="w-full max-w-sm space-y-4">
                <div class="flex items-center gap-2 p-3 bg-white rounded-xl border border-slate-200 shadow-sm">
                    <i class="fa-regular fa-calendar text-slate-500 pl-1"></i>
                    <input type="text" id="main-update-date" placeholder="자료 수정일 입력" onchange="window.saveDate(this.value)" class="bg-transparent border-none w-full text-sm text-slate-700 focus:ring-0">
                </div>
                <div class="p-4 bg-blue-900 rounded-2xl text-white shadow-lg space-y-2">
                    <div class="flex items-center gap-2 border-b border-blue-800 pb-2"><i class="fa-regular fa-credit-card text-blue-300"></i><span class="font-bold text-sm">회비납부 계좌안내</span></div>
                    <div class="text-center py-2"><div class="text-base font-mono tracking-widest">농협 351-1387-9424-73</div><div class="text-xs text-blue-200 mt-2 font-medium">예금주: 청석고8회상조회</div></div>
                </div>
            </div>
        </div>

        <!-- 2. 회원용 조회 -->
        <div id="view-member" class="hidden-view flex flex-col h-full bg-slate-50">
            <header class="p-4 bg-white border-b flex items-center gap-4 shrink-0">
                <button onclick="window.changeView('main')" class="p-2 hover:bg-slate-100 rounded-full"><i class="fa-solid fa-chevron-left text-xl"></i></button>
                <h2 class="text-lg font-bold">회원용 회비 조회</h2>
            </header>
            <div class="p-6 space-y-6 flex-1 overflow-y-auto flex flex-col">
                <div class="relative">
                    <input type="number" id="search-input" placeholder="연락처 뒷자리 4자리" onkeypress="if(event.key === 'Enter') window.executeSearch()" class="w-full p-4 pl-12 bg-white rounded-xl border border-slate-200 shadow-sm text-base">
                    <i class="fa-solid fa-phone absolute left-4 top-5 text-slate-400 text-lg"></i>
                    <button onclick="window.executeSearch()" class="absolute right-2 top-2 px-4 py-2 bg-blue-600 text-white rounded-lg font-bold">검색</button>
                </div>
                <div id="search-result-container" class="space-y-4"></div>
                <div class="mt-auto pt-10 pb-4"><button onclick="window.changeView('main')" class="w-full py-4 bg-slate-300 text-slate-800 font-bold rounded-xl shadow-sm transition-colors hover:bg-slate-400">메인으로 돌아가기</button></div>
            </div>
        </div>

        <!-- 3. 관리자 로그인 -->
        <div id="view-admin-login" class="hidden-view flex flex-col items-center justify-center h-full bg-slate-50 p-6">
            <div class="w-full max-w-sm bg-white p-8 rounded-2xl shadow-md space-y-6 text-center border border-slate-200">
                <h2 class="text-2xl font-bold">관리자 인증</h2>
                <input type="password" id="admin-password" placeholder="비밀번호 입력" onkeypress="if(event.key === 'Enter') window.tryLogin()" class="w-full p-4 bg-slate-100 border border-slate-200 rounded-xl text-center text-xl tracking-widest">
                <div class="flex gap-2">
                    <button onclick="window.changeView('main')" class="flex-1 py-3 bg-slate-200 text-slate-700 font-bold rounded-xl">취소</button>
                    <button onclick="window.tryLogin()" class="flex-1 py-3 bg-slate-900 text-white font-bold rounded-xl">확인</button>
                </div>
            </div>
        </div>

        <!-- 4. 관리자 목록 -->
        <div id="view-admin-list" class="hidden-view flex flex-col h-full bg-slate-50 relative">
            <header class="p-4 bg-white border-b flex justify-between items-center shadow-sm shrink-0">
                <div class="flex items-center gap-3">
                    <button onclick="window.changeView('main')" class="p-2 hover:bg-slate-100 rounded-full"><i class="fa-solid fa-chevron-left text-xl"></i></button>
                    <h2 class="text-lg font-bold text-slate-800">전체 회원 관리</h2>
                </div>
                <div class="flex gap-2">
                    <button onclick="window.deduplicateData()" title="중복 데이터 정리" class="p-2 bg-amber-100 text-amber-700 rounded-lg hover:bg-amber-200 transition-colors"><i class="fa-solid fa-broom"></i></button>
                    <button onclick="window.openEditModal(null)" class="px-3 py-2 bg-slate-900 text-white rounded-lg text-sm font-bold"><i class="fa-solid fa-plus"></i> 신규</button>
                </div>
            </header>
            <div id="admin-scroll-area" class="flex-1 p-4 overflow-auto scroll-smooth">
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 min-w-[700px] mb-24">
                    <table class="w-full text-sm text-left whitespace-nowrap">
                        <thead class="bg-slate-100 text-slate-600 font-bold border-b">
                            <tr><th class="p-3">연번</th><th class="p-3">이름</th><th class="p-3">연락처</th><th class="p-3">납부대상</th><th class="p-3">납입액</th><th class="p-3">잔액</th><th class="p-3 text-center sticky right-0 bg-slate-100">관리</th></tr>
                        </thead>
                        <tbody id="admin-table-body" class="divide-y divide-slate-100">
                            <tr><td colspan="7" class="text-center py-10 text-slate-400">데이터 로딩 중...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <!-- 스크롤 화살표 -->
            <div class="absolute bottom-6 right-6 flex flex-col gap-3 z-10">
                <button onclick="document.getElementById('admin-scroll-area').scrollTop = 0" class="w-12 h-12 bg-slate-700/90 text-white rounded-full shadow-lg flex items-center justify-center"><i class="fa-solid fa-arrow-up"></i></button>
                <button onclick="document.getElementById('admin-scroll-area').scrollTop += 500" class="w-12 h-12 bg-blue-600/90 text-white rounded-full shadow-lg flex items-center justify-center"><i class="fa-solid fa-arrow-down"></i></button>
            </div>
        </div>

        <!-- 5. 정보 수정 팝업 -->
        <div id="modal-edit" class="hidden-view fixed inset-0 bg-black/60 z-50 items-center justify-center p-4 h-full w-full max-w-md mx-auto">
            <div class="bg-white w-full rounded-2xl shadow-2xl p-6 max-h-[90vh] overflow-y-auto">
                <div class="flex justify-between items-center mb-4 border-b pb-3">
                    <h3 id="modal-title" class="text-xl font-bold">회원 정보 수정</h3>
                    <button type="button" onclick="window.closeEditModal()" class="p-1 hover:bg-slate-100 rounded-full"><i class="fa-solid fa-xmark text-xl"></i></button>
                </div>
                <form id="edit-form" onsubmit="window.saveMember(event)" class="space-y-4 text-sm">
                    <input type="hidden" id="edit-id">
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="font-bold text-slate-500 block mb-1">연번</label><input id="edit-seq" type="number" class="w-full p-2 border border-slate-300 rounded" /></div>
                        <div><label class="font-bold text-slate-500 block mb-1">이름</label><input id="edit-name" required class="w-full p-2 border border-slate-300 rounded" /></div>
                    </div>
                    <div><label class="font-bold text-slate-500 block mb-1">연락처</label><input id="edit-phone" placeholder="010-0000-0000" class="w-full p-2 border border-slate-300 rounded" /></div>
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="font-bold text-slate-500 block mb-1">전년도 미납액</label><input id="edit-prev" class="w-full p-2 border border-slate-300 rounded" /></div>
                        <div><label class="font-bold text-slate-500 block mb-1">금년도 연회비</label><input id="edit-year" class="w-full p-2 border border-slate-300 rounded" /></div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="font-bold text-blue-500 block mb-1">납입한 금액</label><input id="edit-paid" class="w-full p-2 border border-blue-300 rounded" /></div>
                        <div><label class="font-bold text-red-500 block mb-1">남은 잔액</label><input id="edit-balance" class="w-full p-2 border border-red-300 rounded" /></div>
                    </div>
                    <div><label class="font-bold text-slate-500 block mb-1">최종납부 상태</label><input id="edit-status" placeholder="예: 🟢 완납" class="w-full p-2 border border-slate-300 rounded" /></div>
                    <div><label class="font-bold text-slate-500 block mb-1">관리자 메모</label><textarea id="edit-memo" placeholder="참고사항" rows="2" class="w-full p-2 border border-slate-300 rounded"></textarea></div>
                    <button type="submit" class="w-full py-3 mt-4 bg-slate-900 text-white font-bold rounded-xl hover:bg-slate-800 transition-colors">저장하기</button>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, getDocs, getDoc, query, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPUzpGVTPBtJOAWBzMq2KVxNBMi9ignUA",
            authDomain: "cs8-v02.firebaseapp.com",
            projectId: "cs8-v02",
            storageBucket: "cs8-v02.firebasestorage.app",
            messagingSenderId: "800327356758",
            appId: "1:800327356758:web:9432cac75f7ec581c106f7",
            measurementId: "G-SST6XK2LJQ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let globalMembers = [];

        // 1. 실시간 데이터 감시 및 UI 업데이트 (중복 제거 필터 포함)
        onSnapshot(collection(db, "members"), (snapshot) => {
            const rawData = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            
            // UI 표시 시 중복 제거 (이름+전화번호 기준)
            const seen = new Set();
            globalMembers = rawData.filter(item => {
                const key = `${item.회원이름}-${item.연락처}`;
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });

            globalMembers.sort((a,b) => (parseInt(a["연번"]) || 0) - (parseInt(b["연번"]) || 0));
            window.renderAdminList();
        });

        // 2. 날짜 감시
        onSnapshot(doc(db, "settings", "global"), (s) => {
            if (s.exists()) document.getElementById('main-update-date').value = s.data().updateDate || '';
        });

        // 3. 중복 데이터 데이터베이스에서 완전히 삭제하는 함수 (관리자 전용)
        window.deduplicateData = async function() {
            if (!confirm("데이터베이스 내의 중복된 항목들을 하나로 통합 정리하시겠습니까?\n이 작업은 데이터가 많을 경우 시간이 걸릴 수 있습니다.")) return;
            
            const snapshot = await getDocs(collection(db, "members"));
            const seen = {};
            const toDelete = [];

            snapshot.forEach((d) => {
                const data = d.data();
                const key = `${data.회원이름}-${data.연락처}`;
                // 만약 동일한 이름/번호가 이미 발견되었는데, 현재 문서 ID가 '연번' 형식이 아니면 삭제 대상
                if (seen[key]) {
                    toDelete.push(d.id);
                } else {
                    seen[key] = true;
                }
            });

            for (const id of toDelete) {
                await deleteDoc(doc(db, "members", id));
            }
            alert("중복 정리가 완료되었습니다.");
        };

        window.changeView = function(vid) {
            document.querySelectorAll('#view-main, #view-member, #view-admin-login, #view-admin-list').forEach(el => el.classList.add('hidden-view'));
            document.getElementById('view-' + vid).classList.remove('hidden-view');
            if (vid === 'member') {
                document.getElementById('search-input').value = '';
                document.getElementById('search-result-container').innerHTML = '<div class="text-center py-10 text-slate-400">연락처 뒷자리 4자리를 입력해 주세요.</div>';
            }
        };

        window.saveDate = async (v) => await setDoc(doc(db, "settings", "global"), { updateDate: v }, { merge: true });

        window.tryLogin = () => {
            if (document.getElementById('admin-password').value === '8383') window.changeView('admin-list');
            else alert('비밀번호가 일치하지 않습니다.');
        };

        window.executeSearch = function() {
            const q = document.getElementById('search-input').value.trim();
            if (!q) return;
            const found = globalMembers.filter(m => String(m["연락처"]).replace(/-/g, '').endsWith(q));
            const container = document.getElementById('search-result-container');
            if (found.length === 0) {
                container.innerHTML = '<div class="text-center py-10 text-slate-400">조회된 정보가 없습니다.</div>';
                return;
            }
            container.innerHTML = found.map(m => `
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-4 animate-in fade-in duration-500">
                    <div class="flex justify-between items-center border-b pb-4"><h3 class="text-2xl font-bold">${m["회원이름"]}</h3><div class="px-3 py-1.5 rounded-full font-bold text-sm ${(m["최종납부 상태"]||"").includes("완납")?"bg-green-100 text-green-700":"bg-red-100 text-red-700"}">${m["최종납부 상태"]||"조회불가"}</div></div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-slate-50 p-3 rounded-xl text-center"><div class="text-xs text-slate-500 mb-1">납부대상</div><div class="font-bold">${m["금년도 연회비"]||0}</div></div>
                        <div class="bg-blue-50 p-3 rounded-xl text-center"><div class="text-xs text-blue-500 mb-1">납입액</div><div class="font-bold text-blue-600">${m["납입한 금액"]||0}</div></div>
                        <div class="col-span-2 bg-red-50 p-3 rounded-xl text-center flex justify-between px-6 items-center"><div class="text-sm text-red-500 font-bold">남은 잔액</div><div class="font-bold text-xl text-red-600">${m["남은 잔액"]||0}</div></div>
                    </div>
                    ${m["관리자 메모"] ? `<div class="text-xs text-slate-400 bg-slate-50 p-2 rounded">메모: ${m["관리자 메모"]}</div>` : ''}
                </div>
            `).join('');
        };

        window.renderAdminList = function() {
            const tbody = document.getElementById('admin-table-body');
            if(globalMembers.length === 0) return;
            tbody.innerHTML = globalMembers.map(m => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="p-3 text-slate-400 font-mono">${m["연번"]}</td><td class="p-3 font-bold">${m["회원이름"]}</td><td class="p-3 text-slate-500">${m["연락처"]}</td>
                    <td class="p-3">${m["납부할 총금액"]||0}</td><td class="p-3 text-blue-600 font-bold">${m["납입한 금액"]||0}</td><td class="p-3 text-red-500 font-bold">${m["남은 잔액"]||0}</td>
                    <td class="p-3 flex justify-center gap-2 sticky right-0 bg-white/95">
                        <button onclick="window.openEditModal('${m.id}')" class="p-2 text-slate-400 hover:text-blue-600"><i class="fa-solid fa-pen"></i></button>
                        <button onclick="window.deleteMember('${m.id}')" class="p-2 text-slate-400 hover:text-red-500"><i class="fa-solid fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        };

        window.deleteMember = async (id) => { if (confirm('정말 삭제하시겠습니까?')) await deleteDoc(doc(db, "members", id)); };

        window.openEditModal = function(id) {
            const m = id ? globalMembers.find(x => x.id === id) : {};
            document.getElementById('modal-title').innerText = id ? '정보 수정' : '신규 회원 등록';
            document.getElementById('edit-id').value = id || '';
            document.getElementById('edit-seq').value = m["연번"] || (globalMembers.length + 1);
            document.getElementById('edit-name').value = m["회원이름"] || '';
            document.getElementById('edit-phone').value = m["연락처"] || '';
            document.getElementById('edit-prev').value = m["전년도 미납액"] || '0';
            document.getElementById('edit-year').value = m["금년도 연회비"] || '120,000';
            document.getElementById('edit-paid').value = m["납입한 금액"] || '0';
            document.getElementById('edit-balance').value = m["남은 잔액"] || '0';
            document.getElementById('edit-status').value = m["최종납부 상태"] || '';
            document.getElementById('edit-memo').value = m["관리자 메모"] || '';
            document.getElementById('modal-edit').classList.remove('hidden-view');
            document.getElementById('modal-edit').classList.add('flex');
        };

        window.closeEditModal = () => {
            document.getElementById('modal-edit').classList.add('hidden-view');
            document.getElementById('modal-edit').classList.remove('flex');
        };

        window.saveMember = async function(e) {
            e.preventDefault();
            const id = document.getElementById('edit-id').value || `ID_${document.getElementById('edit-seq').value}`;
            const newData = {
                "연번": parseInt(document.getElementById('edit-seq').value),
                "회원이름": document.getElementById('edit-name').value,
                "연락처": document.getElementById('edit-phone').value,
                "전년도 미납액": document.getElementById('edit-prev').value,
                "금년도 연회비": document.getElementById('edit-year').value,
                "납입한 금액": document.getElementById('edit-paid').value,
                "남은 잔액": document.getElementById('edit-balance').value,
                "최종납부 상태": document.getElementById('edit-status').value,
                "관리자 메모": document.getElementById('edit-memo').value,
                "납부할 총금액": (parseInt(String(document.getElementById('edit-prev').value).replace(/,/g,'')) || 0) + (parseInt(String(document.getElementById('edit-year').value).replace(/,/g,'')) || 0)
            };
            await setDoc(doc(db, "members", id), newData, { merge: true });
            window.closeEditModal();
        };

        window.changeView('main');
    </script>
</body>
</html>
