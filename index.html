        .hidden-view { display: none !important; }
        input:focus, textarea:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 1px #3b82f6; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }

        /* ---- 모바일 사용성 최적화 ---- */
        html { -webkit-text-size-adjust: 100%; }
        html, body { overscroll-behavior: none; }
        body { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        button, a { touch-action: manipulation; }

        /* 모바일 브라우저 주소창 높이 변화에 대응 (100vh 대신 동적 뷰포트 높이 사용) */
        .app-height { height: 100vh; height: 100dvh; }
        .modal-max-h { max-height: 90vh; max-height: 85dvh; }

        /* iOS Safari에서 input focus 시 자동 확대(줌) 방지: 폰트 16px 이상 강제 */
        input, select, textarea { font-size: 16px; }

        /* 스크롤 영역: 관성 스크롤 + 당겨서 새로고침(overscroll) 방지 */
        .scroll-area { -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }

        /* 노치/홈 인디케이터가 있는 기기 안전 영역 확보 */
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .safe-top { padding-top: env(safe-area-inset-top); }
    </style>
</head>
<body class="bg-slate-200 flex justify-center app-height overflow-hidden font-sans text-slate-800">

            <div class="w-full max-w-sm space-y-4">

                    <div class="flex items-center justify-center bg-slate-50 rounded-xl p-2.5">
                        <div id="acctNum-main" data-raw="3511387942473" class="text-sm font-mono font-bold tracking-wide text-slate-800 text-center">
                            351-1387-9424-73 <span class="text-[11px] font-normal text-slate-500">(예금주: 청석고8회상조회)</span>

                        <span class="copy-icon-wrap inline-flex">

                            <svg class="check-icon hidden" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>

        <!-- 2. 회원용 조회 -->

                <button onclick="window.changeView('main')" class="p-2 hover:bg-slate-100 rounded-full"><i class="fa-solid fa-chevron-left text-xl"></i></button>

                    <input type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="4" id="search-input" placeholder="연락처 뒷자리 4자리" onkeypress="if(event.key === 'Enter') window.executeSearch()" class="w-full p-4 pl-12 bg-white rounded-xl border border-slate-200 shadow-sm text-base">
                    <i class="fa-solid fa-phone absolute left-4 top-5 text-slate-400 text-lg"></i>
                    <button onclick="window.executeSearch()" class="absolute right-2 top-2 px-4 py-2 bg-blue-600 text-white rounded-lg font-bold">검색</button>

                <div id="search-result-container" class="space-y-4"></div>
                <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-3 space-y-1.5">
                    <h2 class="text-sm font-bold text-slate-800 text-center">청석고8회 상조회 전용계좌(NH농협은행)</h2>
                    <div class="flex items-center justify-center bg-slate-50 rounded-xl p-2.5">
                        <div id="acctNum-member" data-raw="3511387942473" class="text-sm font-mono font-bold tracking-wide text-slate-800 text-center">
                            351-1387-9424-73 <span class="text-[11px] font-normal text-slate-500">(예금주: 청석고8회상조회)</span>

                    <button type="button" id="copyBtn-member" onclick="window.copyAccount('acctNum-member','copyBtn-member')" class="w-full flex items-center justify-center gap-1.5 py-2 border border-slate-300 rounded-xl text-xs font-bold text-slate-700 hover:bg-slate-50 transition-colors">
                        <span class="copy-icon-wrap inline-flex">
                            <svg class="copy-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                            <svg class="check-icon hidden" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>

                <div class="mt-auto pt-6 pb-4"><button onclick="window.changeView('main')" class="w-full py-4 bg-slate-300 text-slate-800 font-bold rounded-xl shadow-sm transition-colors hover:bg-slate-400">메인으로 돌아가기</button></div>
            </div>

        <!-- 3. 관리자 로그인 -->
        <div id="view-admin-login" class="hidden-view flex flex-col items-center justify-center h-full bg-slate-50 p-6">
            <div class="w-full max-w-sm bg-white p-8 rounded-2xl shadow-md space-y-6 text-center border border-slate-200">

                <input type="password" id="admin-password" placeholder="비밀번호 입력" onkeypress="if(event.key === 'Enter') window.tryLogin()" class="w-full p-4 bg-slate-100 border border-slate-200 rounded-xl text-center text-xl tracking-widest">
                <div class="flex gap-2">
                    <button onclick="window.changeView('main')" class="flex-1 py-3 bg-slate-200 text-slate-700 font-bold rounded-xl">취소</button>
                    <button onclick="window.tryLogin()" class="flex-1 py-3 bg-slate-900 text-white font-bold rounded-xl">확인</button>
                </div>
            </div>
        </div>

        <!-- 4. 관리자 목록 -->
        <div id="view-admin-list" class="hidden-view flex flex-col h-full bg-slate-50 relative">
            <header class="p-4 bg-white border-b flex justify-between items-center shadow-sm shrink-0">
                <div class="flex items-center gap-3">
                    <button onclick="window.changeView('main')" class="p-2 hover:bg-slate-100 rounded-full"><i class="fa-solid fa-chevron-left text-xl"></i></button>
                    <h2 class="text-lg font-bold text-slate-800">전체 회원 관리</h2>
                </div>
                <div class="flex gap-2">
                    <button onclick="window.deduplicateData()" title="중복 데이터 정리" class="p-2 bg-amber-100 text-amber-700 rounded-lg hover:bg-amber-200 transition-colors"><i class="fa-solid fa-broom"></i></button>
                    <button onclick="window.openEditModal(null)" class="px-3 py-2 bg-slate-900 text-white rounded-lg text-sm font-bold"><i class="fa-solid fa-plus"></i> 신규</button>

            </header>
            <div id="admin-scroll-area" class="flex-1 p-4 overflow-auto scroll-smooth scroll-area">
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 min-w-[700px] mb-24">
                    <table class="w-full text-sm text-left whitespace-nowrap">
                        <thead class="bg-slate-100 text-slate-600 font-bold border-b">
                            <tr><th class="p-3">연번</th><th class="p-3">이름</th><th class="p-3">연락처</th><th class="p-3">납부대상</th><th class="p-3">납입액</th><th class="p-3">잔액</th><th class="p-3 text-center sticky right-0 bg-slate-100">관리</th></tr>
                        </thead>
                        <tbody id="admin-table-body" class="divide-y divide-slate-100">
                            <tr><td colspan="7" class="text-center py-10 text-slate-400">데이터 로딩 중...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="absolute right-6 flex flex-col gap-3 z-10" style="bottom: calc(1.5rem + env(safe-area-inset-bottom));">
                <button onclick="document.getElementById('admin-scroll-area').scrollTop = 0" class="w-12 h-12 bg-slate-700/90 text-white rounded-full shadow-lg flex items-center justify-center"><i class="fa-solid fa-arrow-up"></i></button>
                <button onclick="document.getElementById('admin-scroll-area').scrollTop += 500" class="w-12 h-12 bg-blue-600/90 text-white rounded-full shadow-lg flex items-center justify-center"><i class="fa-solid fa-arrow-down"></i></button>
            </div>
        </div>

        <!-- 5. 정보 수정 팝업 -->
        <div id="modal-edit" class="hidden-view fixed inset-0 bg-black/60 z-50 items-center justify-center p-4 h-full w-full max-w-md mx-auto">
            <div class="bg-white w-full rounded-2xl shadow-2xl p-6 modal-max-h overflow-y-auto scroll-area">
                <div class="flex justify-between items-center mb-4 border-b pb-3">
                    <h3 id="modal-title" class="text-xl font-bold">회원 정보 수정</h3>
                    <button type="button" onclick="window.closeEditModal()" class="p-1 hover:bg-slate-100 rounded-full"><i class="fa-solid fa-xmark text-xl"></i></button>
                </div>
                <form id="edit-form" onsubmit="window.saveMember(event)" class="space-y-4 text-sm">
                    <input type="hidden" id="edit-id">
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="font-bold text-slate-500 block mb-1">연번</label><input id="edit-seq" type="number" class="w-full p-2 border border-slate-300 rounded" /></div>
                        <div><label class="font-bold text-slate-500 block mb-1">이름</label><input id="edit-name" required class="w-full p-2 border border-slate-300 rounded" /></div>
                    </div>
                    <div><label class="font-bold text-slate-500 block mb-1">연락처</label><input id="edit-phone" placeholder="010-0000-0000" class="w-full p-2 border border-slate-300 rounded" /></div>

                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="font-bold text-slate-500 block mb-1">전년도 미납액</label><input id="edit-prev" inputmode="numeric" class="w-full p-2 border border-slate-300 rounded" /></div>
                        <div><label class="font-bold text-slate-500 block mb-1">금년도 연회비</label><input id="edit-year" inputmode="numeric" value="120,000" class="w-full p-2 border border-slate-300 rounded" /></div>
                    </div>

                    <!-- 자동 계산: 납부대상 총금액 -->
                    <div class="bg-slate-100 rounded-lg p-3 flex justify-between items-center">
                        <span class="text-xs font-bold text-slate-500">납부할 총금액 (자동계산)</span>
                        <span id="edit-total-display" class="font-bold text-slate-700">0 원</span>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="font-bold text-blue-500 block mb-1">납입한 금액</label><input id="edit-paid" inputmode="numeric" class="w-full p-2 border border-blue-300 rounded" /></div>
                        <div>
                            <label class="font-bold text-red-500 block mb-1">남은 잔액 <span class="text-[10px] text-slate-400 font-normal">(자동)</span></label>
                            <input id="edit-balance" readonly class="w-full p-2 border border-red-200 bg-red-50 rounded cursor-not-allowed font-bold text-red-600" />
                        </div>
                    </div>
                    <div>
                        <label class="font-bold text-slate-500 block mb-1">최종납부 상태 <span class="text-[10px] text-slate-400 font-normal">(자동 산정, 수정 가능)</span></label>
                        <input id="edit-status" placeholder="예: 🟢 완납" class="w-full p-2 border border-slate-300 rounded" />
                    </div>
                    <div><label class="font-bold text-slate-500 block mb-1">관리자 메모</label><textarea id="edit-memo" placeholder="참고사항" rows="2" class="w-full p-2 border border-slate-300 rounded"></textarea></div>
                    <button type="submit" class="w-full py-3 mt-4 bg-slate-900 text-white font-bold rounded-xl hover:bg-slate-800 transition-colors">저장하기</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, getDocs, getDoc, query, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDPUzpGVTPBtJOAWBzMq2KVxNBMi9ignUA",
            authDomain: "cs8-v02.firebaseapp.com",
            projectId: "cs8-v02",
            storageBucket: "cs8-v02.firebasestorage.app",
            messagingSenderId: "800327356758",
            appId: "1:800327356758:web:9432cac75f7ec581c106f7",
            measurementId: "G-SST6XK2LJQ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let globalMembers = [];

        // ---------- 계좌번호 복사 ----------
        window.copyAccount = async function (numElId, btnElId) {
            const numEl = document.getElementById(numElId);
            const accountNumber = numEl ? numEl.dataset.raw : '3511387942473'; // NH농협은행 351-1387-9424-73

            try {
                await navigator.clipboard.writeText(accountNumber);
            } catch (err) {
                // Clipboard API 미지원 브라우저 대비 폴백
                const ta = document.createElement('textarea');
                ta.value = accountNumber;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.focus();
                ta.select();
                try { document.execCommand('copy'); } catch (e) {}
                document.body.removeChild(ta);
            }

            const btn = document.getElementById(btnElId);
            if (!btn) return;
            const copyIcon = btn.querySelector('.copy-icon');
            const checkIcon = btn.querySelector('.check-icon');
            const label = btn.querySelector('.copy-label');
            const originalLabel = label.innerText;

            copyIcon.classList.add('hidden');
            checkIcon.classList.remove('hidden');
            label.innerText = '복사완료';
            btn.classList.add('text-green-600', 'border-green-400');

            setTimeout(() => {
                copyIcon.classList.remove('hidden');
                checkIcon.classList.add('hidden');
                label.innerText = originalLabel;
                btn.classList.remove('text-green-600', 'border-green-400');
            }, 1500);
        };

        // ---------- 금액 계산 유틸 ----------
        function toNumber(v) {
            return parseInt(String(v || '0').replace(/[^0-9-]/g, ''), 10) || 0;
        }
        function formatNumber(n) {
            return (n || 0).toLocaleString('ko-KR');
        }

        // 전년도 미납액 + 금년도 연회비 + 납입액 → 총금액 / 잔액 / 상태 자동 계산
        window.updateCalculation = function () {
            const prev = toNumber(document.getElementById('edit-prev').value);
            const year = toNumber(document.getElementById('edit-year').value);
            const paid = toNumber(document.getElementById('edit-paid').value);

            const total = prev + year;
            const balance = total - paid;

            document.getElementById('edit-total-display').innerText = formatNumber(total) + ' 원';
            document.getElementById('edit-balance').value = formatNumber(balance);

            // 잔액이 0 이하면 완납, 아니면 미납(잔액 표기) 자동 설정 (직접 덮어쓰기 가능)
            document.getElementById('edit-status').value = balance <= 0
                ? '🟢 완납'
                : `🔴 미납 (${formatNumber(balance)}원)`;
        };

        // 입력 중에는 계산만, blur 시 쉼표 포맷팅까지 적용
        ['edit-prev', 'edit-year', 'edit-paid'].forEach(id => {
            const el = document.getElementById(id);
            el.addEventListener('input', window.updateCalculation);
            el.addEventListener('blur', function () {
                this.value = formatNumber(toNumber(this.value));
                window.updateCalculation();
            });
        });

        // 1. 실시간 데이터 감시 및 UI 업데이트 (중복 제거 필터 포함)
        onSnapshot(collection(db, "members"), (snapshot) => {
            const rawData = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));

            // UI 표시 시 중복 제거 (이름+전화번호 기준, 연번이 낮은 쪽을 우선 채택)
            rawData.sort((a, b) => (parseInt(a["연번"]) || 9999) - (parseInt(b["연번"]) || 9999));
            const seen = new Set();
            globalMembers = rawData.filter(item => {
                const key = `${item.회원이름}-${item.연락처}`;
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });

            globalMembers.sort((a, b) => (parseInt(a["연번"]) || 0) - (parseInt(b["연번"]) || 0));
            window.renderAdminList();
        });

        // 2. 날짜 감시
        onSnapshot(doc(db, "settings", "global"), (s) => {
            if (s.exists()) document.getElementById('main-update-date').value = s.data().updateDate || '';
        });

        // 3. 중복 데이터 데이터베이스에서 완전히 삭제하는 함수 (관리자 전용)
        //    연번이 낮은(=먼저 등록된/정상적인) 문서를 우선 보존하도록 정렬 후 처리
        window.deduplicateData = async function () {
            if (!confirm("데이터베이스 내의 중복된 항목들을 하나로 통합 정리하시겠습니까?\n이 작업은 데이터가 많을 경우 시간이 걸릴 수 있습니다.")) return;

            const snapshot = await getDocs(collection(db, "members"));
            let docs = snapshot.docs.map(d => ({ id: d.id, data: d.data() }));

            // 연번 기준 오름차순 정렬 → 가장 낮은 연번을 가진 문서를 정본으로 유지
            docs.sort((a, b) => (parseInt(a.data["연번"]) || 9999) - (parseInt(b.data["연번"]) || 9999));

            const seen = {};
            const toDelete = [];

            docs.forEach((d) => {
                const key = `${d.data.회원이름}-${d.data.연락처}`;
                if (seen[key]) {
                    toDelete.push(d.id);
                } else {
                    seen[key] = true;
                }
            });

            for (const id of toDelete) {
                await deleteDoc(doc(db, "members", id));
            }
            alert(`중복 정리가 완료되었습니다. (${toDelete.length}건 삭제)`);
        };

        window.changeView = function (vid) {
            document.querySelectorAll('#view-main, #view-member, #view-admin-login, #view-admin-list').forEach(el => el.classList.add('hidden-view'));
            document.getElementById('view-' + vid).classList.remove('hidden-view');
            if (vid === 'member') {
                document.getElementById('search-input').value = '';
                document.getElementById('search-result-container').innerHTML = '<div class="text-center py-10 text-slate-400">연락처 뒷자리 4자리를 입력해 주세요.</div>';
            }
        };

        window.saveDate = async (v) => await setDoc(doc(db, "settings", "global"), { updateDate: v }, { merge: true });

        window.tryLogin = () => {
            if (document.getElementById('admin-password').value === '8383') window.changeView('admin-list');
            else alert('비밀번호가 일치하지 않습니다.');
        };

        window.executeSearch = function () {
            const q = document.getElementById('search-input').value.trim();
            if (!q) return;
            const found = globalMembers.filter(m => String(m["연락처"] || '').replace(/-/g, '').endsWith(q));
            const container = document.getElementById('search-result-container');
            if (found.length === 0) {
                container.innerHTML = '<div class="text-center py-10 text-slate-400">조회된 정보가 없습니다.</div>';
                return;
            }
            // 회원용 화면에는 개인 납부 정보(전년도 미납액 / 금년도 연회비 / 납입한 금액 / 남은 잔액)만 노출
            // 관리자 메모, 최종납부 상태 배지 등 내부 관리용 정보는 노출하지 않음
            container.innerHTML = found.map(m => `
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-4 animate-in fade-in duration-500">
                    <div class="border-b pb-3"><h3 class="text-2xl font-bold">${m["회원이름"]}</h3></div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-slate-50 p-3 rounded-xl text-center"><div class="text-xs text-slate-500 mb-1">전년도 미납액</div><div class="font-bold">${m["전년도 미납액"] || 0}</div></div>
                        <div class="bg-slate-50 p-3 rounded-xl text-center"><div class="text-xs text-slate-500 mb-1">금년도 연회비</div><div class="font-bold">${m["금년도 연회비"] || "120,000"}</div></div>
                        <div class="bg-blue-50 p-3 rounded-xl text-center"><div class="text-xs text-blue-500 mb-1">납입한 금액</div><div class="font-bold text-blue-600">${m["납입한 금액"] || 0}</div></div>
                        <div class="bg-red-50 p-3 rounded-xl text-center"><div class="text-xs text-red-500 mb-1">남은 잔액</div><div class="font-bold text-red-600">${m["남은 잔액"] || 0}</div></div>
                    </div>
                </div>
            `).join('');
        };

        window.renderAdminList = function () {
            const tbody = document.getElementById('admin-table-body');
            if (globalMembers.length === 0) return;
            tbody.innerHTML = globalMembers.map(m => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="p-3 text-slate-400 font-mono">${m["연번"]}</td><td class="p-3 font-bold">${m["회원이름"]}</td><td class="p-3 text-slate-500">${m["연락처"]}</td>
                    <td class="p-3">${m["납부할 총금액"] || 0}</td><td class="p-3 text-blue-600 font-bold">${m["납입한 금액"] || 0}</td><td class="p-3 text-red-500 font-bold">${m["남은 잔액"] || 0}</td>
                    <td class="p-3 flex justify-center gap-2 sticky right-0 bg-white/95">
                        <button onclick="window.openEditModal('${m.id}')" class="p-2 min-w-[40px] min-h-[40px] flex items-center justify-center text-slate-400 hover:text-blue-600"><i class="fa-solid fa-pen"></i></button>
                        <button onclick="window.deleteMember('${m.id}')" class="p-2 min-w-[40px] min-h-[40px] flex items-center justify-center text-slate-400 hover:text-red-500"><i class="fa-solid fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        };

        window.deleteMember = async (id) => { if (confirm('정말 삭제하시겠습니까?')) await deleteDoc(doc(db, "members", id)); };

        window.openEditModal = function (id) {
            const m = id ? globalMembers.find(x => x.id === id) : {};

            // 신규 등록 시 연번은 기존 최댓값+1 (삭제로 인한 연번 충돌 방지)
            const nextSeq = globalMembers.length
                ? Math.max(...globalMembers.map(x => parseInt(x["연번"]) || 0)) + 1
                : 1;

            document.getElementById('modal-title').innerText = id ? '정보 수정' : '신규 회원 등록';
            document.getElementById('edit-id').value = id || '';
            document.getElementById('edit-seq').value = m["연번"] || nextSeq;
            document.getElementById('edit-name').value = m["회원이름"] || '';
            document.getElementById('edit-phone').value = m["연락처"] || '';
            document.getElementById('edit-prev').value = m["전년도 미납액"] || '0';
            document.getElementById('edit-year').value = m["금년도 연회비"] || '120,000';
            document.getElementById('edit-paid').value = m["납입한 금액"] || '0';

            // 잔액/총금액/상태는 자동 계산으로 채움 (기존 상태값이 수동으로 다르게 입력돼 있어도 재계산됨)
            window.updateCalculation();
            if (!id && m["최종납부 상태"]) document.getElementById('edit-status').value = m["최종납부 상태"];

            document.getElementById('edit-memo').value = m["관리자 메모"] || '';
            document.getElementById('modal-edit').classList.remove('hidden-view');
            document.getElementById('modal-edit').classList.add('flex');
        };

        window.closeEditModal = () => {
            document.getElementById('modal-edit').classList.add('hidden-view');
            document.getElementById('modal-edit').classList.remove('flex');
        };

        window.saveMember = async function (e) {
            e.preventDefault();
            const id = document.getElementById('edit-id').value || `ID_${document.getElementById('edit-seq').value}`;

            const prev = toNumber(document.getElementById('edit-prev').value);
            const year = toNumber(document.getElementById('edit-year').value);
            const paid = toNumber(document.getElementById('edit-paid').value);
            const total = prev + year;
            const balance = total - paid;

            const newData = {
                "연번": parseInt(document.getElementById('edit-seq').value),
                "회원이름": document.getElementById('edit-name').value,
                "연락처": document.getElementById('edit-phone').value,
                "전년도 미납액": formatNumber(prev),
                "금년도 연회비": formatNumber(year),
                "납입한 금액": formatNumber(paid),
                "남은 잔액": formatNumber(balance),
                "최종납부 상태": document.getElementById('edit-status').value,
                "관리자 메모": document.getElementById('edit-memo').value,
                "납부할 총금액": total
            };
            await setDoc(doc(db, "members", id), newData, { merge: true });
            window.closeEditModal();
        };

        window.changeView('main');
    </script>
</body>
</html>
